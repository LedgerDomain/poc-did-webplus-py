# Interoperability testing: Python and Rust did:webplus VDR/VDG
# Run: ./run_interop_tests.sh <1|2|3|4>

volumes:
  rust_vdr_postgres_data:
  rust_vdg_postgres_data:
  python_vdr_data:

services:
  rust-vdr-db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - rust_vdr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  rust-vdg-db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - rust_vdg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  rust-vdr:
    image: ghcr.io/ledgerdomain/did-webplus-vdr:v0.1.0-rc.0
    platform: linux/amd64
    environment:
      DID_WEBPLUS_VDR_DATABASE_URL: postgres://postgres:postgres@rust-vdr-db:5432/postgres?sslmode=disable
      DID_WEBPLUS_VDR_DID_HOSTNAME: rust-vdr
      DID_WEBPLUS_VDR_DID_PORT: "8085"
      DID_WEBPLUS_VDR_HTTP_SCHEME_OVERRIDE: 'rust-vdg=http'
      DID_WEBPLUS_VDR_LISTEN_PORT: "8085"
      DID_WEBPLUS_VDR_VDG_HOSTS: ${RUST_VDR_VDG_HOSTS:-}
    ports:
      - "8085:8085"
    depends_on:
      rust-vdr-db:
        condition: service_healthy

  rust-vdg:
    image: ghcr.io/ledgerdomain/did-webplus-vdg:v0.1.0-rc.0
    platform: linux/amd64
    environment:
      DID_WEBPLUS_VDG_DATABASE_URL: postgres://postgres:postgres@rust-vdg-db:5432/postgres?sslmode=disable
      DID_WEBPLUS_VDG_HTTP_SCHEME_OVERRIDE: 'python-vdr=http,rust-vdr=http'
      DID_WEBPLUS_VDG_LISTEN_PORT: "8086"
    ports:
      - "8086:8086"
    depends_on:
      rust-vdg-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8086/health"]
      start_period: 15s
      interval: 5s
      timeout: 4s
      retries: 5

  python-vdr:
    build:
      context: ..
      dockerfile: interop/Dockerfile.python-vdr
    environment:
      DID_WEBPLUS_VDR_DID_HOSTNAME: python-vdr
      DID_WEBPLUS_VDR_DID_PORT: "8087"
      DID_WEBPLUS_VDR_LISTEN_PORT: "8087"
      DID_WEBPLUS_VDR_VDG_HOSTS: ${PYTHON_VDR_VDG_HOSTS:-}
      DID_WEBPLUS_STORE: /data/did_documents.db
    volumes:
      - python_vdr_data:/data
    ports:
      - "8087:8087"
    command: ["--host", "0.0.0.0", "--port", "8087", "--did-hostname", "python-vdr", "--did-port", "8087"]
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8087/health"]
      start_period: 10s
      interval: 5s
      timeout: 4s
      retries: 5
